name = "bidph-api"
main = "src/worker.ts"
compatibility_date = "2026-01-01"

[dev]
port = 3001

[vars]
NODE_ENV = "production"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

# Production: push to main — GitHub Actions sets bindings (see README).
# Local worker dev: copy .dev.vars.example → .dev.vars
